<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Page For My Princess</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#ffd6e7,#ffeccf);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

.container{
  text-align:center;
}

h1{
  color:#ff4f81;
  margin-bottom:30px;
}

.note-box{
  width:320px;
  height:120px;
  background:white;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
  overflow:hidden;
  position:relative;
}

.note{
  position:absolute;
  font-size:18px;
  width:260px;
  text-align:center;
  opacity:0;
  transform:translateX(-120%);
}

.slide{
  animation:slideIn 1s forwards;
}

@keyframes slideIn{
  0%{
    transform:translateX(-120%);
    opacity:0;
  }
  60%{
    opacity:1;
  }
  100%{
    transform:translateX(0);
    opacity:1;
  }
}

.music-btn{
  margin-top:20px;
  border:none;
  background:#ff4f81;
  color:white;
  padding:10px 20px;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

.music-btn:hover{
  background:#ff2f6a;
}

.footer{
  margin-top:20px;
  font-size:12px;
  color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1><center> For My Princess Ivy 🌸</center></h1>

<div class="note-box">
<div id="note" class="note slide">Someone made this page just to remind you that you matter.</div>
</div>

<button class="music-btn" onclick="toggleMusic()" id="musicBtn">▶ Play Music</button>

<div class="footer">Made with love by yours truely Miles 💖</div>

</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const notes=[
"Hey there Crushiee 🌸, just a reminder that you are stronger than you think.",
"Even if today feels heavy, tomorrow can feel lighter.",
"Someone out there appreciates your smile more than you know.",
"You deserve kindness, rest, and good things.",
"The world is brighter because you're in it.",
"Take a breath. You're doing better than you think.",
"Bad days don't last forever.",
"You matter more than you realize.",
"It's okay to have tough days. They don't erase your worth.",
"Your presence makes someone's day better, even if you don't see it.",
"You have already survived so many hard moments. That's strength.",
"The world needs more of your kindness and heart.",
"Every step forward, even a small one, is still progress.",
"You deserve peace, laughter, and gentle days.",
"Remember to be proud of how far you've come.",
"Even the stars shine brighter after the darkest night.",
"You are appreciated more than you know.",
"There are good things ahead waiting for you.",
"Your smile has the power to brighten a room.",
"You are not alone. Someone cares deeply about you.",
"It's okay to pause and breathe. You're doing your best.",
"You are worthy of love, happiness, and calm moments.",
"You bring warmth into the world just by being you.",
"Better days are slowly finding their way to you.",
"You are stronger than yesterday and braver than you realize."
]

let index=0

function showNote(){

const note=document.getElementById("note")

note.classList.remove("slide")

setTimeout(()=>{

index=(index+1)%notes.length

note.innerText=notes[index]

note.classList.add("slide")

},200)

}

setInterval(showNote,4000)

/* MUSIC CONTROL */

const music=document.getElementById("music")
const musicBtn=document.getElementById("musicBtn")

function toggleMusic(){

if(music.paused){
  music.play()
  musicBtn.innerText="⏸ Pause Music"
}else{
  music.pause()
  musicBtn.innerText="▶ Play Music"
}

}

</script>

</body>
</html>
